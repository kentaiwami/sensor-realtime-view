<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensor Realtime</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 2rem;
    }
    #clock {
      position: fixed;
      top: 1rem;
      right: 1.5rem;
      font-size: 1.1rem;
      color: #aaa;
    }
    h1 {
      margin-top: 0;
      font-size: 1.4rem;
      color: #ccc;
    }
    .readings {
      margin-top: 3rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .row {
      font-size: 2rem;
    }
    .label {
      color: #888;
      font-size: 1rem;
      margin-bottom: 0.2rem;
    }
    .value {
      font-size: 2.5rem;
      font-weight: bold;
    }
    .na {
      color: #555;
    }
    .recorded-at {
      font-size: 0.75rem;
      color: #666;
      margin-top: 0.15rem;
    }
    @media (max-width: 480px) {
      .value { font-size: 2rem; }
      .recorded-at { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <div id="clock"></div>
  <h1>Sensor Realtime</h1>
  <h2 style="font-size:1.1rem;color:#ccc;margin-top:0;">BLE 在室</h2>
  <div class="readings">
    <div class="row">
      <div class="label">現在地</div>
      <div class="value" id="presence">--</div>
      <div class="recorded-at" id="presence-at"></div>
    </div>
  </div>
  <div class="readings" id="ble-readings"></div>

  <h2 style="font-size:1.1rem;color:#ccc;margin-top:2.5rem;">センサー</h2>
  <div class="readings">
    <div class="row">
      <div class="label">におい (raw)</div>
      <div class="value" id="smell">--</div>
      <div class="recorded-at" id="smell-at"></div>
    </div>
    <div class="row">
      <div class="label">CO2 (ppm)</div>
      <div class="value" id="co2">--</div>
      <div class="recorded-at" id="co2-at"></div>
    </div>
    <div class="row">
      <div class="label">温度 (°C)</div>
      <div class="value" id="temperature">--</div>
      <div class="recorded-at" id="temperature-at"></div>
    </div>
    <div class="row">
      <div class="label">湿度 (%)</div>
      <div class="value" id="humidity">--</div>
      <div class="recorded-at" id="humidity-at"></div>
    </div>
  </div>

  <script>
    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleString('ja-JP');
    }
    setInterval(updateClock, 1000);
    updateClock();

    function fmt(v, decimals = 1) {
      return v != null ? Number(v).toFixed(decimals) : '<span class="na">--</span>';
    }

    function setAt(id, at) {
      document.getElementById(id + '-at').textContent = at ? at : '';
    }

    async function fetchLatest() {
      try {
        const res = await fetch('/api/latest');
        if (!res.ok) return;
        const d = await res.json();
        document.getElementById('smell').innerHTML = fmt(d.smell.value, 4);
        document.getElementById('co2').innerHTML = fmt(d.co2.value);
        document.getElementById('temperature').innerHTML = fmt(d.temperature.value);
        document.getElementById('humidity').innerHTML = fmt(d.humidity.value);
        setAt('smell', d.smell.recorded_at);
        setAt('co2', d.co2.recorded_at);
        setAt('temperature', d.temperature.recorded_at);
        setAt('humidity', d.humidity.recorded_at);
        document.getElementById('presence').textContent = d.presence.location || '--';
        setAt('presence', d.presence.recorded_at);
      } catch (_) {}
    }

    setInterval(fetchLatest, 1000);
    fetchLatest();

    async function fetchBle() {
      try {
        const res = await fetch('/api/ble');
        if (!res.ok) return;
        const list = await res.json();
        const container = document.getElementById('ble-readings');
        container.innerHTML = (list || []).map(b => `
          <div class="row">
            <div class="label">RSSI (${b.location})</div>
            <div class="value">${b.rssi != null ? b.rssi + ' dBm' : '<span class="na">--</span>'}</div>
            <div class="recorded-at">${b.recorded_at || ''}</div>
          </div>`).join('');
      } catch (_) {}
    }

    setInterval(fetchBle, 1000);
    fetchBle();
  </script>
</body>
</html>
