apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensor-realtime-view
  namespace: sensor-realtime-view
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sensor-realtime-view
  template:
    metadata:
      labels:
        app: sensor-realtime-view
    spec:
      containers:
        - name: sensor-realtime-view
          image: __REGISTRY_HOST__:5000/sensor-realtime-view:__IMAGE_TAG__
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sensor-realtime-view-secret
                  key: database-url
            - name: VIEW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sensor-realtime-view-secret
                  key: view-password
